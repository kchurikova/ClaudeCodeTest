<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      letter-spacing: 2px;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      height: 1.5em;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      animation: pulse 0.4s ease;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    #restart {
      margin-top: 1.8rem;
      padding: 0.7rem 2rem;
      font-size: 1rem;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.15s, transform 0.1s;
    }

    #restart:hover {
      background: #c73652;
      transform: scale(1.04);
    }

    #score {
      display: flex;
      gap: 2.5rem;
      margin-bottom: 1.5rem;
      font-size: 1rem;
      color: #aaa;
    }

    #score span { text-align: center; }
    #score strong { display: block; font-size: 1.6rem; color: #eee; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>

  <div id="score">
    <span>X Wins<strong id="xScore">0</strong></span>
    <span>Draws<strong id="dScore">0</strong></span>
    <span>O Wins<strong id="oScore">0</strong></span>
  </div>

  <div id="status">X's turn</div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <button id="restart">New Game</button>

  <script>
    const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    const cells = document.querySelectorAll('.cell');
    const status = document.getElementById('status');
    const xScore = document.getElementById('xScore');
    const oScore = document.getElementById('oScore');
    const dScore = document.getElementById('dScore');

    let board, current, over, scores = {X:0, O:0, D:0};

    function init() {
      board = Array(9).fill('');
      current = 'X';
      over = false;
      cells.forEach(c => { c.textContent = ''; c.className = 'cell'; });
      status.textContent = "X's turn";
    }

    function checkWin() {
      for (const [a,b,c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return [a, b, c];
        }
      }
      return null;
    }

    cells.forEach(cell => {
      cell.addEventListener('click', () => {
        const i = +cell.dataset.i;
        if (over || board[i]) return;

        board[i] = current;
        cell.textContent = current;
        cell.classList.add(current.toLowerCase(), 'taken');

        const win = checkWin();
        if (win) {
          win.forEach(idx => cells[idx].classList.add('win'));
          status.textContent = `${current} wins!`;
          scores[current]++;
          xScore.textContent = scores.X;
          oScore.textContent = scores.O;
          over = true;
        } else if (board.every(v => v)) {
          status.textContent = "It's a draw!";
          scores.D++;
          dScore.textContent = scores.D;
          over = true;
        } else {
          current = current === 'X' ? 'O' : 'X';
          status.textContent = `${current}'s turn`;
        }
      });
    });

    document.getElementById('restart').addEventListener('click', init);

    init();
  </script>
</body>
</html>
